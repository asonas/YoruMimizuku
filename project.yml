name: YoruMimizuku
options:
  bundleIdPrefix: as.ason
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  BlueskyCore:
    path: core
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
targets:
  YoruMimizuku:
    type: application
    platform: macOS
    sources:
      - apps/macos
    dependencies:
      - package: BlueskyCore
        product: BlueskyCore
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: as.ason.YoruMimizuku
        PRODUCT_NAME: YoruMimizuku
        MARKETING_VERSION: "1.0.0-dev.14"
        CURRENT_PROJECT_VERSION: "25"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: QYP65434UW
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: apps/macos/Info.plist
      properties:
        CFBundleDisplayName: YoruMimizuku
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "15.0"
        SUFeedURL: https://asonas.github.io/YoruMimizuku/appcast.xml
        SUPublicEDKey: "8c0cuIKl7mQR1iOxRVu3/a4d8ySnE4NlyzXol8oFhDM="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        CFBundleURLTypes:
          - CFBundleURLName: as.ason.YoruMimizuku
            CFBundleURLSchemes:
              - as.ason
  YoruMimizukuPad:
    type: application
    platform: iOS
    sources:
      - apps/ipados
    dependencies:
      - package: BlueskyCore
        product: BlueskyCore
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: as.ason.YoruMimizukuPad
        PRODUCT_NAME: YoruMimizuku
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: QYP65434UW
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: apps/ipados/Info.plist
      properties:
        CFBundleDisplayName: YoruMimizuku
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # The app uses only standard encryption (HTTPS/TLS for XRPC, OAuth PKCE +
        # DPoP), which is exempt from export compliance. Declaring this here stops
        # TestFlight from marking each build "Missing Compliance" — that state
        # blocks distribution to testers and hangs the Xcode Cloud TestFlight
        # post-action.
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: as.ason.YoruMimizukuPad
            CFBundleURLSchemes:
              - as.ason
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  YoruMimizukuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - apps/macosTests
      - apps/macos/Update/UpdateBadgeState.swift
      - apps/macos/Update/UpdateChannel.swift
      - apps/macos/Update/UpdateChannelStore.swift
      - apps/macos/Update/LaunchUpdatePrompt.swift
      - apps/macos/Update/InstallerVolumeEjection.swift
      - apps/macos/Media/ImageEncoder.swift
      - apps/macos/Media/ComposerMediaIntake.swift
      - apps/macos/Media/ImageDownsampler.swift
      - apps/macos/Media/RemoteImage.swift
      - apps/macos/Catalog/CatalogRegistry.swift
      - apps/macos/Views/PostRowView.swift
      - apps/macos/Views/QuoteCardView.swift
      - apps/macos/Views/LinkCardView.swift
      - apps/macos/Views/VideoPosterView.swift
      - apps/macos/Views/ToastView.swift
      - apps/macos/Views/SessionReauthBanner.swift
      - apps/macos/Theme.swift
      - apps/macos/DisplaySettings.swift
      - apps/macos/Typography.swift
    dependencies:
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
  YoruMimizukuPadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - apps/ipadosTests
      - apps/ipados/Media/ImageDownsampler.swift
      - apps/ipados/Media/RemoteImage.swift
      - apps/ipados/Catalog/CatalogRegistry.swift
      - apps/ipados/Views/PostRowView.swift
      - apps/ipados/Views/QuoteCardView.swift
      - apps/ipados/Views/LinkCardView.swift
      - apps/ipados/Views/VideoPosterView.swift
      - apps/ipados/Views/SettingsView.swift
      - apps/ipados/Views/SessionReauthBanner.swift
      - apps/ipados/Views/FilterEditorView.swift
      - apps/ipados/Theme.swift
      - apps/ipados/DisplaySettings.swift
      - apps/ipados/NotificationSettings.swift
      - apps/ipados/Typography.swift
    dependencies:
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  YoruMimizuku:
    build:
      targets:
        YoruMimizuku: all
    run:
      config: Debug
    test:
      targets:
        - YoruMimizukuTests
  YoruMimizukuPad:
    build:
      targets:
        YoruMimizukuPad: all
        YoruMimizukuPadTests: [test]
    run:
      config: Debug
    test:
      targets:
        - YoruMimizukuPadTests
