name: YoruMimizuku
options:
  bundleIdPrefix: as.ason
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  BlueskyCore:
    path: core
targets:
  YoruMimizuku:
    type: application
    platform: macOS
    sources:
      - apps/macos
    dependencies:
      - package: BlueskyCore
        product: BlueskyCore
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: as.ason.YoruMimizuku
        PRODUCT_NAME: YoruMimizuku
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: QYP65434UW
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: apps/macos/Info.plist
      properties:
        CFBundleDisplayName: YoruMimizuku
        LSMinimumSystemVersion: "15.0"
        CFBundleURLTypes:
          - CFBundleURLName: as.ason.YoruMimizuku
            CFBundleURLSchemes:
              - as.ason
schemes:
  YoruMimizuku:
    build:
      targets:
        YoruMimizuku: all
    run:
      config: Debug
