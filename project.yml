name: YoruMimizuku
options:
  bundleIdPrefix: as.ason
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  BlueskyCore:
    path: core
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0
targets:
  YoruMimizuku:
    type: application
    platform: macOS
    sources:
      - apps/macos
    dependencies:
      - package: BlueskyCore
        product: BlueskyCore
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: as.ason.YoruMimizuku
        PRODUCT_NAME: YoruMimizuku
        MARKETING_VERSION: "0.8.0-dev.4"
        CURRENT_PROJECT_VERSION: "10"
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: QYP65434UW
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: apps/macos/Info.plist
      properties:
        CFBundleDisplayName: YoruMimizuku
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "15.0"
        SUFeedURL: https://asonas.github.io/YoruMimizuku/appcast.xml
        SUPublicEDKey: "8c0cuIKl7mQR1iOxRVu3/a4d8ySnE4NlyzXol8oFhDM="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        CFBundleURLTypes:
          - CFBundleURLName: as.ason.YoruMimizuku
            CFBundleURLSchemes:
              - as.ason
  YoruMimizukuPad:
    type: application
    platform: iOS
    sources:
      - apps/ipados
    dependencies:
      - package: BlueskyCore
        product: BlueskyCore
      - package: BlueskyCore
        product: YoruMimizukuKit
      - package: BlueskyCore
        product: PlatformApple
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: as.ason.YoruMimizukuPad
        PRODUCT_NAME: YoruMimizuku
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: QYP65434UW
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: apps/ipados/Info.plist
      properties:
        CFBundleDisplayName: YoruMimizuku
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: as.ason.YoruMimizukuPad
            CFBundleURLSchemes:
              - as.ason
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  YoruMimizukuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - apps/macosTests
      - apps/macos/Update/UpdateBadgeState.swift
      - apps/macos/Update/UpdateChannel.swift
      - apps/macos/Update/UpdateChannelStore.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  YoruMimizuku:
    build:
      targets:
        YoruMimizuku: all
    run:
      config: Debug
    test:
      targets:
        - YoruMimizukuTests
  YoruMimizukuPad:
    build:
      targets:
        YoruMimizukuPad: all
    run:
      config: Debug
