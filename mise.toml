[tools]
xcodegen = "latest"

[env]
SCHEME = "YoruMimizuku"
APP_NAME = "YoruMimizuku"
CONFIGURATION = "Release"
BUILD_DIR = "build"
PROJECT = "YoruMimizuku.xcodeproj"
TEAM_ID = "QYP65434UW"
# Developer ID Application identity used to sign the DMG itself.
SIGN_IDENTITY = "Developer ID Application: Yuya Fujiwara (QYP65434UW)"
# Keychain profile name used by notarytool. Create it once with `mise run setup-notary`.
NOTARY_PROFILE = "YoruMimizukuNotary"
GITHUB_REPO = "asonas/YoruMimizuku"
GITHUB_REMOTE = "github"
SPARKLE_BIN = "/opt/homebrew/Caskroom/sparkle/2.9.3/bin"
APPCAST_STABLE = "build/appcast.xml"
APPCAST_DEV = "build/appcast-dev.xml"

[tasks.generate]
description = "Generate the Xcode project from project.yml"
run = "xcodegen generate"

[tasks.archive]
description = "Archive the app for release"
depends = ["generate"]
run = """
xcodebuild archive \
  -scheme "$SCHEME" \
  -project "$PROJECT" \
  -configuration "$CONFIGURATION" \
  -destination 'generic/platform=macOS' \
  -archivePath "$BUILD_DIR/$APP_NAME.xcarchive"
"""

[tasks.export]
description = "Export a Developer ID signed .app from the archive"
depends = ["archive"]
run = """
rm -rf "$BUILD_DIR/export"
xcodebuild -exportArchive \
  -archivePath "$BUILD_DIR/$APP_NAME.xcarchive" \
  -exportOptionsPlist ExportOptions.plist \
  -exportPath "$BUILD_DIR/export"
"""

[tasks."notarize-app"]
description = "Notarize and staple the exported .app for Sparkle and DMG packaging"
depends = ["export"]
run = """
set -euo pipefail
app="$BUILD_DIR/export/$APP_NAME.app"
zip="$BUILD_DIR/$APP_NAME-notary.zip"
rm -f "$zip"
ditto -c -k --keepParent "$app" "$zip"
xcrun notarytool submit "$zip" \
  --keychain-profile "$NOTARY_PROFILE" \
  --wait
xcrun stapler staple "$app"
spctl -a -vvv -t exec "$app"
rm -f "$zip"
"""

[tasks.dmg]
description = "Package the stapled .app into a signed DMG with an /Applications drop link"
depends = ["notarize-app"]
run = """
set -euo pipefail
app="$BUILD_DIR/export/$APP_NAME.app"
staging="$BUILD_DIR/dmg-staging"
rw_dmg="$BUILD_DIR/$APP_NAME-rw.dmg"
final_dmg="$BUILD_DIR/$APP_NAME.dmg"

# Stage the app next to an /Applications symlink so the window offers drag-to-install.
rm -rf "$staging" "$rw_dmg" "$final_dmg"
mkdir -p "$staging"
cp -R "$app" "$staging/"
ln -s /Applications "$staging/Applications"

# A read-write image we can arrange in Finder before compressing.
hdiutil create -volname "$APP_NAME" -srcfolder "$staging" -fs HFS+ -format UDRW -ov "$rw_dmg"

# Arrange the icons. Best-effort: a headless machine has no Finder, so ignore failures
# and still ship a valid (unstyled) DMG.
mount_dir="$(mktemp -d)"
hdiutil attach "$rw_dmg" -mountpoint "$mount_dir" -nobrowse -noautoopen
osascript scripts/dmg-layout.applescript "$APP_NAME" "$APP_NAME.app" || true
sync
hdiutil detach "$mount_dir" || hdiutil detach "$mount_dir" -force
rmdir "$mount_dir" || true

# Compress to the final read-only image and sign it.
hdiutil convert "$rw_dmg" -format UDZO -imagekey zlib-level=9 -ov -o "$final_dmg"
rm -rf "$rw_dmg" "$staging"
codesign --force --timestamp --sign "$SIGN_IDENTITY" "$final_dmg"
"""

[tasks.notarize]
description = "Notarize and staple the DMG, then verify with Gatekeeper"
depends = ["dmg"]
run = """
xcrun notarytool submit "$BUILD_DIR/$APP_NAME.dmg" \
  --keychain-profile "$NOTARY_PROFILE" \
  --wait
xcrun stapler staple "$BUILD_DIR/$APP_NAME.dmg"
spctl -a -vvv -t open --context context:primary-signature "$BUILD_DIR/$APP_NAME.dmg"
"""

[tasks.release]
description = "Build stable release artifacts (DMG + Sparkle appcast)"
depends = ["release:stable"]
run = 'echo "Release artifacts ready under $BUILD_DIR"'

[tasks."sparkle-zip"]
description = "Create the Sparkle update ZIP from the notarized/stapled app"
depends = ["notarize-app"]
run = """
set -euo pipefail
version="$(python3 - <<'PY'
import re
text = open('project.yml').read()
print(re.search(r'MARKETING_VERSION: "([^"]+)"', text).group(1))
PY
)"
zip="$BUILD_DIR/$APP_NAME-$version.zip"
rm -f "$zip"
ditto -c -k --keepParent "$BUILD_DIR/export/$APP_NAME.app" "$zip"
echo "Sparkle ZIP ready: $zip"
"""

[tasks."appcast:stable"]
description = "Generate stable appcast.xml for GitHub Pages"
depends = ["sparkle-zip"]
run = """
set -euo pipefail
version="$(python3 - <<'PY'
import re
text = open('project.yml').read()
print(re.search(r'MARKETING_VERSION: "([^"]+)"', text).group(1))
PY
)"
archives="$BUILD_DIR/appcast-stable"
rm -rf "$archives"
mkdir -p "$archives"
cp "$BUILD_DIR/$APP_NAME-$version.zip" "$archives/"
"$SPARKLE_BIN/generate_appcast" \
  --download-url-prefix "https://github.com/$GITHUB_REPO/releases/download/v$version/" \
  "$archives"
cp "$archives/appcast.xml" "$APPCAST_STABLE"
echo "Stable appcast ready: $APPCAST_STABLE"
"""

[tasks."appcast:dev"]
description = "Generate development appcast-dev.xml for GitHub Pages"
depends = ["sparkle-zip"]
run = """
set -euo pipefail
version="$(python3 - <<'PY'
import re
text = open('project.yml').read()
print(re.search(r'MARKETING_VERSION: "([^"]+)"', text).group(1))
PY
)"
archives="$BUILD_DIR/appcast-dev"
rm -rf "$archives"
mkdir -p "$archives"
cp "$BUILD_DIR/$APP_NAME-$version.zip" "$archives/"
"$SPARKLE_BIN/generate_appcast" \
  --download-url-prefix "https://github.com/$GITHUB_REPO/releases/download/v$version/" \
  "$archives"
cp "$archives/appcast.xml" "$APPCAST_DEV"
echo "Development appcast ready: $APPCAST_DEV"
"""

[tasks."release:stable"]
description = "Build stable release artifacts for vX.Y.Z"
depends = ["notarize", "appcast:stable"]
run = 'echo "Stable release ready: $BUILD_DIR/$APP_NAME.dmg, $BUILD_DIR/$APP_NAME-<version>.zip, $APPCAST_STABLE"'

[tasks."release:dev"]
description = "Build development prerelease artifacts for vX.Y.Z-dev.N"
depends = ["notarize-app", "appcast:dev"]
run = 'echo "Development release ready: $BUILD_DIR/$APP_NAME-<version>.zip, $APPCAST_DEV"'

[tasks."publish:stable"]
description = "Manually publish stable artifacts to GitHub Releases and gh-pages"
run = """
set -euo pipefail
version="$(python3 - <<'PY'
import re
text = open('project.yml').read()
print(re.search(r'MARKETING_VERSION: "([^"]+)"', text).group(1))
PY
)"
gh release create "v$version" \
  "$BUILD_DIR/$APP_NAME-$version.zip" \
  "$BUILD_DIR/$APP_NAME.dmg" \
  --repo "$GITHUB_REPO" \
  --title "YoruMimizuku $version" \
  --notes-file "build/release-notes-$version.md"
echo "Push $APPCAST_STABLE to gh-pages root as appcast.xml using remote $GITHUB_REMOTE."
"""

[tasks."publish:dev"]
description = "Manually publish development ZIP to a GitHub prerelease and gh-pages"
run = """
set -euo pipefail
version="$(python3 - <<'PY'
import re
text = open('project.yml').read()
print(re.search(r'MARKETING_VERSION: "([^"]+)"', text).group(1))
PY
)"
gh release create "v$version" \
  "$BUILD_DIR/$APP_NAME-$version.zip" \
  --repo "$GITHUB_REPO" \
  --title "YoruMimizuku $version" \
  --notes-file "build/release-notes-$version.md" \
  --prerelease
echo "Push $APPCAST_DEV to gh-pages root as appcast-dev.xml using remote $GITHUB_REMOTE."
"""

[tasks.setup-notary]
description = "Store notarytool credentials in the keychain (run once, interactive)"
run = """
echo "Apple ID and an app-specific password (from appleid.apple.com) are required."
xcrun notarytool store-credentials "$NOTARY_PROFILE" --team-id "$TEAM_ID"
"""

[tasks.bump]
description = "Set MARKETING_VERSION in project.yml, bump the build number, and regenerate"
usage = 'arg "version" help="New marketing version, e.g. 0.2.0"'
run = './scripts/bump-version.sh "$usage_version"'

[tasks."wiki:lint"]
description = "Validate docs/wiki frontmatter, [[links]], and source paths"
run = "swift run --quiet --package-path tools/wiki wiki lint"

[tasks."wiki:index"]
description = "Regenerate docs/wiki/index.md from page frontmatter"
run = "swift run --quiet --package-path tools/wiki wiki index"

[tasks."wiki:matrix"]
description = "Regenerate docs/wiki/support-matrix.md from behavior `features:` blocks"
run = "swift run --quiet --package-path tools/wiki wiki matrix"

[tasks."wiki:check"]
description = "Lint the wiki and verify index.md and support-matrix.md are up to date (CI / pre-commit)"
run = "swift run --quiet --package-path tools/wiki wiki check"

[tasks."wiki:install-hooks"]
description = "Point git at the committed hooks in scripts/hooks (wiki pre-commit)"
run = "git config core.hooksPath scripts/hooks"
