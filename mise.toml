[tools]
xcodegen = "latest"

[env]
SCHEME = "YoruMimizuku"
APP_NAME = "YoruMimizuku"
CONFIGURATION = "Release"
BUILD_DIR = "build"
PROJECT = "YoruMimizuku.xcodeproj"
TEAM_ID = "QYP65434UW"
# Developer ID Application identity used to sign the DMG itself.
SIGN_IDENTITY = "Developer ID Application: Yuya Fujiwara (QYP65434UW)"
# Keychain profile name used by notarytool. Create it once with `mise run setup-notary`.
NOTARY_PROFILE = "YoruMimizukuNotary"

[tasks.generate]
description = "Generate the Xcode project from project.yml"
run = "xcodegen generate"

[tasks.archive]
description = "Archive the app for release"
depends = ["generate"]
run = """
xcodebuild archive \
  -scheme "$SCHEME" \
  -project "$PROJECT" \
  -configuration "$CONFIGURATION" \
  -destination 'generic/platform=macOS' \
  -archivePath "$BUILD_DIR/$APP_NAME.xcarchive"
"""

[tasks.export]
description = "Export a Developer ID signed .app from the archive"
depends = ["archive"]
run = """
rm -rf "$BUILD_DIR/export"
xcodebuild -exportArchive \
  -archivePath "$BUILD_DIR/$APP_NAME.xcarchive" \
  -exportOptionsPlist ExportOptions.plist \
  -exportPath "$BUILD_DIR/export"
"""

[tasks.dmg]
description = "Package the exported .app into a signed DMG with an /Applications drop link"
depends = ["export"]
run = """
set -euo pipefail
app="$BUILD_DIR/export/$APP_NAME.app"
staging="$BUILD_DIR/dmg-staging"
rw_dmg="$BUILD_DIR/$APP_NAME-rw.dmg"
final_dmg="$BUILD_DIR/$APP_NAME.dmg"

# Stage the app next to an /Applications symlink so the window offers drag-to-install.
rm -rf "$staging" "$rw_dmg" "$final_dmg"
mkdir -p "$staging"
cp -R "$app" "$staging/"
ln -s /Applications "$staging/Applications"

# A read-write image we can arrange in Finder before compressing.
hdiutil create -volname "$APP_NAME" -srcfolder "$staging" -fs HFS+ -format UDRW -ov "$rw_dmg"

# Arrange the icons. Best-effort: a headless machine has no Finder, so ignore failures
# and still ship a valid (unstyled) DMG.
mount_dir="$(mktemp -d)"
hdiutil attach "$rw_dmg" -mountpoint "$mount_dir" -nobrowse -noautoopen
osascript scripts/dmg-layout.applescript "$APP_NAME" "$APP_NAME.app" || true
sync
hdiutil detach "$mount_dir" || hdiutil detach "$mount_dir" -force
rmdir "$mount_dir" || true

# Compress to the final read-only image and sign it.
hdiutil convert "$rw_dmg" -format UDZO -imagekey zlib-level=9 -ov -o "$final_dmg"
rm -rf "$rw_dmg" "$staging"
codesign --force --timestamp --sign "$SIGN_IDENTITY" "$final_dmg"
"""

[tasks.notarize]
description = "Notarize and staple the DMG, then verify with Gatekeeper"
depends = ["dmg"]
run = """
xcrun notarytool submit "$BUILD_DIR/$APP_NAME.dmg" \
  --keychain-profile "$NOTARY_PROFILE" \
  --wait
xcrun stapler staple "$BUILD_DIR/$APP_NAME.dmg"
spctl -a -vvv -t open --context context:primary-signature "$BUILD_DIR/$APP_NAME.dmg"
"""

[tasks.release]
description = "Build, sign, notarize and package a distributable DMG"
depends = ["notarize"]
run = 'echo "Release DMG ready: $BUILD_DIR/$APP_NAME.dmg"'

[tasks.setup-notary]
description = "Store notarytool credentials in the keychain (run once, interactive)"
run = """
echo "Apple ID and an app-specific password (from appleid.apple.com) are required."
xcrun notarytool store-credentials "$NOTARY_PROFILE" --team-id "$TEAM_ID"
"""

[tasks.bump]
description = "Set MARKETING_VERSION in project.yml, bump the build number, and regenerate"
usage = 'arg "version" help="New marketing version, e.g. 0.2.0"'
run = './scripts/bump-version.sh "$usage_version"'

[tasks."wiki:lint"]
description = "Validate docs/wiki frontmatter, [[links]], and source paths"
run = "swift run --quiet --package-path tools/wiki wiki lint"

[tasks."wiki:index"]
description = "Regenerate docs/wiki/index.md from page frontmatter"
run = "swift run --quiet --package-path tools/wiki wiki index"

[tasks."wiki:matrix"]
description = "Regenerate docs/wiki/support-matrix.md from behavior `features:` blocks"
run = "swift run --quiet --package-path tools/wiki wiki matrix"

[tasks."wiki:check"]
description = "Lint the wiki and verify index.md and support-matrix.md are up to date (CI / pre-commit)"
run = "swift run --quiet --package-path tools/wiki wiki check"

[tasks."wiki:install-hooks"]
description = "Point git at the committed hooks in scripts/hooks (wiki pre-commit)"
run = "git config core.hooksPath scripts/hooks"
